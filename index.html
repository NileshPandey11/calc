<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* LOGIN SCREEN */
  #loginScreen {
    position: fixed; inset: 0;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .login-box {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 32px 28px;
    width: 280px;
    text-align: center;
  }
  .login-box h2 {
    color: #e0e0e0;
    font-size: 15px;
    font-weight: normal;
    letter-spacing: 2px;
    margin-bottom: 24px;
    opacity: 0.7;
  }
  .login-box input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #555;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 12px;
    margin-bottom: 10px;
    outline: none;
  }
  .login-box input:focus { border-color: #888; }
  .login-btn {
    width: 100%;
    background: #3a3a3a;
    border: 1px solid #666;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 11px;
    margin-top: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #4a4a4a; }
  #loginErr {
    color: #cc5555;
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
  }

  /* MAIN CALC CONTAINER */
  #app {
    display: none;
    flex-direction: column;
    width: 320px;
    height: 580px;
    background: #1e1e1e;
    border-radius: 20px;
    border: 1px solid #333;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  /* TOP: CHAT AREA (upper half) */
  #chatSection {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #161616;
    border-bottom: 2px solid #2a2a2a;
    position: relative;
    overflow: hidden;
  }
  #chatHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid #2a2a2a;
    background: #1a1a1a;
  }
  .chat-user-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .user-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4caf50;
  }
  .chat-username {
    color: #888;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .logout-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .logout-btn:hover { color: #888; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: none;
  }
  #messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 75%;
    padding: 7px 11px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.4;
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  .msg.sent {
    background: #2d4a3e;
    color: #b8e6c8;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .msg.recv {
    background: #2a2a3a;
    color: #b8c4e0;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .msg.vanishing {
    animation: fadeOut 0.5s ease forwards;
  }
  .msg-time {
    font-size: 9px;
    opacity: 0.4;
    margin-top: 2px;
    text-align: right;
  }

  #chatInput {
    display: flex;
    padding: 8px 10px;
    gap: 6px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
  }
  #msgInput {
    flex: 1;
    background: #252525;
    border: 1px solid #3a3a3a;
    border-radius: 16px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
  }
  #msgInput:focus { border-color: #555; }
  #msgInput::placeholder { color: #444; }
  #sendBtn {
    background: #2d4a3e;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    color: #b8e6c8;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #sendBtn:hover { background: #3d5e4e; }

  /* BOTTOM: CALCULATOR */
  #calcSection {
    height: 280px;
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
  }
  #calcDisplay {
    background: #141414;
    padding: 10px 16px 8px;
    text-align: right;
    border-bottom: 1px solid #2a2a2a;
  }
  #calcExpr {
    color: #555;
    font-size: 11px;
    min-height: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #calcResult {
    color: #e8e8e8;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    min-height: 32px;
  }

  #calcButtons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    flex: 1;
    background: #111;
    padding: 1px;
  }
  .calc-btn {
    background: #252525;
    border: none;
    color: #d0d0d0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.1s, transform 0.05s;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .calc-btn:active { transform: scale(0.94); }
  .calc-btn.op { background: #2a2520; color: #f0a050; }
  .calc-btn.eq { background: #2d4a3e; color: #b8e6c8; }
  .calc-btn.clear { background: #3a2020; color: #e08080; }
  .calc-btn.zero { grid-column: span 2; }
  .calc-btn:hover { background: #303030; }
  .calc-btn.op:hover { background: #352e24; }
  .calc-btn.eq:hover { background: #3d5e4e; }
  .calc-btn.clear:hover { background: #4a2828; }

  .other-user-indicator {
    text-align: center;
    font-size: 10px;
    color: #444;
    padding: 4px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>CALC v2.4</h2>
    <input type="text" id="loginName" placeholder="name" autocomplete="off" />
    <input type="password" id="loginPass" placeholder="password" autocomplete="off" />
    <button class="login-btn" onclick="doLogin()">ENTER</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- CHAT TOP -->
  <div id="chatSection">
    <div id="chatHeader">
      <div class="chat-user-info">
        <div class="user-dot"></div>
        <span class="chat-username" id="displayName">nil</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">exit</button>
    </div>
    <div id="messages">
      <div class="other-user-indicator" id="otherIndicator"></div>
    </div>
    <div id="chatInput">
      <input type="text" id="msgInput" placeholder="message..." maxlength="200" autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- CALCULATOR BOTTOM -->
  <div id="calcSection">
    <div id="calcDisplay">
      <div id="calcExpr"></div>
      <div id="calcResult">0</div>
    </div>
    <div id="calcButtons">
      <button class="calc-btn clear" onclick="calcClear()">C</button>
      <button class="calc-btn op" onclick="calcSign()">+/-</button>
      <button class="calc-btn op" onclick="calcPercent()">%</button>
      <button class="calc-btn op" onclick="calcOp('/')">÷</button>

      <button class="calc-btn" onclick="calcNum('7')">7</button>
      <button class="calc-btn" onclick="calcNum('8')">8</button>
      <button class="calc-btn" onclick="calcNum('9')">9</button>
      <button class="calc-btn op" onclick="calcOp('*')">×</button>

      <button class="calc-btn" onclick="calcNum('4')">4</button>
      <button class="calc-btn" onclick="calcNum('5')">5</button>
      <button class="calc-btn" onclick="calcNum('6')">6</button>
      <button class="calc-btn op" onclick="calcOp('-')">−</button>

      <button class="calc-btn" onclick="calcNum('1')">1</button>
      <button class="calc-btn" onclick="calcNum('2')">2</button>
      <button class="calc-btn" onclick="calcNum('3')">3</button>
      <button class="calc-btn op" onclick="calcOp('+')">+</button>

      <button class="calc-btn zero" onclick="calcNum('0')">0</button>
      <button class="calc-btn" onclick="calcDot()">.</button>
      <button class="calc-btn eq" onclick="calcEquals()">=</button>
    </div>
  </div>
</div>

<script>
// ---- AUTH ----
const USERS = {
  'nil': '143',
  'hi': '143'
};

let currentUser = null;
let otherUser = null;

function doLogin() {
  const name = document.getElementById('loginName').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value.trim();
  if (USERS[name] && USERS[name] === pass) {
    currentUser = name;
    otherUser = Object.keys(USERS).find(u => u !== name);
    document.getElementById('displayName').textContent = name;
    document.getElementById('otherIndicator').textContent = '← ' + otherUser + ' —';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadMessages();
  } else {
    document.getElementById('loginErr').textContent = 'wrong credentials';
    setTimeout(() => document.getElementById('loginErr').textContent = '', 2000);
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('messages').innerHTML = '<div class="other-user-indicator" id="otherIndicator"></div>';
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ---- STORAGE (messages stored in memory, survive tab but reset on reload) ----
let allMessages = [];
const AUTO_VANISH_MS = 5000;

function saveMessages() {
  try { sessionStorage.setItem('sc_msgs', JSON.stringify(allMessages)); } catch(e) {}
}
function loadMessages() {
  try {
    const d = sessionStorage.getItem('sc_msgs');
    if (d) {
      allMessages = JSON.parse(d);
      allMessages.forEach(m => renderMessage(m, true));
    }
  } catch(e) {}
  setupVanishTimers();
}

// ---- MESSAGING ----
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const msg = {
    id: Date.now() + '_' + Math.random(),
    sender: currentUser,
    text: text,
    ts: Date.now()
  };
  allMessages.push(msg);
  saveMessages();
  renderMessage(msg, false);
  scheduleVanish(msg.id, AUTO_VANISH_MS);
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// Poll for messages from other user (simulated via sessionStorage)
setInterval(() => {
  if (!currentUser) return;
  try {
    const d = sessionStorage.getItem('sc_msgs');
    if (!d) return;
    const stored = JSON.parse(d);
    stored.forEach(m => {
      if (m.sender !== currentUser) {
        if (!allMessages.find(x => x.id === m.id)) {
          allMessages.push(m);
          renderMessage(m, false);
          scheduleVanish(m.id, AUTO_VANISH_MS);
        }
      }
    });
  } catch(e) {}
}, 500);

function renderMessage(msg, skipAnim) {
  const container = document.getElementById('messages');
  const isMine = msg.sender === currentUser;
  const el = document.createElement('div');
  el.className = 'msg ' + (isMine ? 'sent' : 'recv');
  el.id = 'msg_' + msg.id;
  if (skipAnim) el.style.animation = 'none';

  const timeStr = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  el.innerHTML = `<div>${escHtml(msg.text)}</div><div class="msg-time">${isMine ? 'you' : msg.sender} · ${timeStr}</div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function scheduleVanish(id, delay) {
  const elapsed = Date.now() - parseInt(id.split('_')[0]);
  const remaining = Math.max(0, delay - elapsed);
  setTimeout(() => vanishMessage(id), remaining);
}

function setupVanishTimers() {
  allMessages.forEach(m => scheduleVanish(m.id, AUTO_VANISH_MS));
}

function vanishMessage(id) {
  const el = document.getElementById('msg_' + id);
  if (el) {
    el.classList.add('vanishing');
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 500);
  }
  allMessages = allMessages.filter(m => m.id !== id);
  saveMessages();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- CALCULATOR ----
let calcState = { display: '0', expr: '', waitingOp: false, prevVal: null, op: null, justEvaled: false };

function calcUpdate() {
  document.getElementById('calcResult').textContent = calcState.display;
  document.getElementById('calcExpr').textContent = calcState.expr;
}

function calcNum(n) {
  if (calcState.waitingOp || calcState.justEvaled) {
    calcState.display = n;
    calcState.waitingOp = false;
    calcState.justEvaled = false;
  } else {
    calcState.display = calcState.display === '0' ? n : calcState.display + n;
  }
  calcUpdate();
}

function calcDot() {
  if (calcState.waitingOp || calcState.justEvaled) {
    calcState.display = '0.';
    calcState.waitingOp = false;
    calcState.justEvaled = false;
  } else if (!calcState.display.includes('.')) {
    calcState.display += '.';
  }
  calcUpdate();
}

function calcOp(op) {
  const val = parseFloat(calcState.display);
  if (calcState.prevVal !== null && !calcState.waitingOp) {
    const res = compute(calcState.prevVal, val, calcState.op);
    calcState.display = fmtNum(res);
    calcState.prevVal = res;
  } else {
    calcState.prevVal = val;
  }
  calcState.op = op;
  calcState.expr = fmtNum(calcState.prevVal) + ' ' + opSym(op);
  calcState.waitingOp = true;
  calcState.justEvaled = false;
  calcUpdate();
}

function calcEquals() {
  if (calcState.prevVal === null || calcState.op === null) return;
  const val = parseFloat(calcState.display);
  const res = compute(calcState.prevVal, val, calcState.op);
  calcState.expr = fmtNum(calcState.prevVal) + ' ' + opSym(calcState.op) + ' ' + fmtNum(val) + ' =';
  calcState.display = fmtNum(res);
  calcState.prevVal = null;
  calcState.op = null;
  calcState.justEvaled = true;
  calcUpdate();
}

function calcClear() {
  calcState = { display: '0', expr: '', waitingOp: false, prevVal: null, op: null, justEvaled: false };
  calcUpdate();
}

function calcSign() {
  calcState.display = fmtNum(parseFloat(calcState.display) * -1);
  calcUpdate();
}

function calcPercent() {
  calcState.display = fmtNum(parseFloat(calcState.display) / 100);
  calcUpdate();
}

function compute(a, b, op) {
  switch(op) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b !== 0 ? a / b : 0;
  }
  return b;
}

function fmtNum(n) {
  if (Number.isInteger(n)) return String(n);
  const s = parseFloat(n.toFixed(10)).toString();
  return s;
}

function opSym(op) {
  return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
}

// keyboard for calc
document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('msgInput')) return;
  if (document.activeElement === document.getElementById('loginName') ||
      document.activeElement === document.getElementById('loginPass')) return;
  if ('0123456789'.includes(e.key)) calcNum(e.key);
  else if (e.key === '.') calcDot();
  else if (e.key === '+') calcOp('+');
  else if (e.key === '-') calcOp('-');
  else if (e.key === '*') calcOp('*');
  else if (e.key === '/') { e.preventDefault(); calcOp('/'); }
  else if (e.key === 'Enter' || e.key === '=') calcEquals();
  else if (e.key === 'Escape') calcClear();
  else if (e.key === 'Backspace') {
    if (calcState.display.length > 1) calcState.display = calcState.display.slice(0,-1);
    else calcState.display = '0';
    calcUpdate();
  }
});
</script>
</body>
</html>
