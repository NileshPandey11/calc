<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Calculator</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000000;
            --panel: #111111;
            --ghost-text: #555555; /* Kam visible text */
            --my-msg: #1a1a1a;    /* Boht halka background */
            --op: #ff9f0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Login - Ekdum Simple */
        #loginScreen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 260px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #222; background: #111; color: #444; text-align: center; outline: none; }
        .login-btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #1a1a1a; color: #444; cursor: pointer; }

        .container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; }

        /* Chat Section - Hidden Look */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .chat-header { padding: 8px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        .chat-header span { color: #222; font-size: 10px; }
        .exit-btn { color: #333; font-size: 10px; cursor: pointer; background: none; border: none; }

        #msgContainer { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .bubble { 
            max-width: 85%; padding: 6px 10px; border-radius: 10px; font-size: 13px; 
            color: var(--ghost-text); /* Light gray text */
            background: transparent; border: none; /* No boundaries */
        }
        .sent { align-self: flex-end; background: var(--my-msg); text-align: right; }
        .recv { align-self: flex-start; background: #0a0a0a; }

        .chat-input { padding: 10px; display: flex; gap: 10px; background: #000; }
        .chat-input input { flex: 1; background: #080808; border: none; padding: 8px; color: #444; outline: none; font-size: 13px; }
        .send-btn { background: none; border: none; color: #222; font-size: 18px; cursor: pointer; }

        /* Calculator - Real Look */
        .calc-area { height: 380px; background: #000; display: flex; flex-direction: column; }
        .calc-display { padding: 20px; text-align: right; color: white; font-size: 48px; font-weight: 300; }
        .calc-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #222; }
        .btn { background: #000; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: #111; }
        .op { color: var(--op); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <input type="text" id="user" placeholder="ID">
        <input type="password" id="pass" placeholder="PIN">
        <button class="login-btn" onclick="doLogin()">Connect</button>
    </div>
</div>

<div class="container" id="app" style="display: none;">
    <div class="chat-area">
        <div class="chat-header">
            <span id="who">.</span>
            <button class="exit-btn" onclick="doExit()">close</button>
        </div>
        <div id="msgContainer"></div>
        <div class="chat-input">
            <input type="text" id="msgIn" placeholder="...">
            <button class="send-btn" onclick="sendMsg()">›</button>
        </div>
    </div>

    <div class="calc-area">
        <div class="calc-display" id="disp">0</div>
        <div class="calc-grid">
            <button class="btn op" onclick="cClear()">C</button>
            <button class="btn op">+/-</button>
            <button class="btn op">%</button>
            <button class="btn op" onclick="cOp('/')">÷</button>
            <button class="btn" onclick="cNum('7')">7</button>
            <button class="btn" onclick="cNum('8')">8</button>
            <button class="btn" onclick="cNum('9')">9</button>
            <button class="btn op" onclick="cOp('*')">×</button>
            <button class="btn" onclick="cNum('4')">4</button>
            <button class="btn" onclick="cNum('5')">5</button>
            <button class="btn" onclick="cNum('6')">6</button>
            <button class="btn op" onclick="cOp('-')">−</button>
            <button class="btn" onclick="cNum('1')">1</button>
            <button class="btn" onclick="cNum('2')">2</button>
            <button class="btn" onclick="cNum('3')">3</button>
            <button class="btn op" onclick="cOp('+')">+</button>
            <button class="btn" style="grid-column: span 2;" onclick="cNum('0')">0</button>
            <button class="btn" onclick="cNum('.')">.</button>
            <button class="btn op" style="background: var(--op); color: white;" onclick="cEqual()">=</button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAULIbWFH3f5dojXoaFYgdacp1Vl7F4nuQ",
        authDomain: "calc-34b58.firebaseapp.com",
        databaseURL: "https://calc-34b58-default-rtdb.firebaseio.com",
        projectId: "calc-34b58",
        storageBucket: "calc-34b58.firebasestorage.app",
        messagingSenderId: "882053838693",
        appId: "1:882053838693:web:5098cdac4f65b583f9d38c"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    let me = "";

    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if((u === "nil" && p === "143") || (u === "hi" && p === "143")) {
            me = u;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadChat();
        }
    }

    function loadChat() {
        db.ref('messages').on('value', (snap) => {
            const cont = document.getElementById('msgContainer');
            cont.innerHTML = "";
            const msgs = snap.val();
            if(msgs) {
                Object.keys(msgs).forEach(id => {
                    const m = msgs[id];
                    const d = document.createElement('div');
                    d.className = `bubble ${m.s === me ? 'sent' : 'recv'}`;
                    d.innerText = m.t;
                    cont.appendChild(d);

                    // Real Auto-Delete Logic:
                    // Delete ONLY if it's not my message AND I have seen it now
                    if(m.s !== me && !m.v) {
                        db.ref('messages/' + id).update({ v: true });
                        setTimeout(() => {
                            db.ref('messages/' + id).remove();
                        }, 5000);
                    }
                });
                cont.scrollTop = cont.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgIn');
        if(!inp.value.trim()) return;
        // v: false means 'not seen yet'
        db.ref('messages').push({ s: me, t: inp.value, v: false });
        inp.value = "";
    }

    function doExit() {
        // Exit ab sirf app reload karega, messages wipe nahi honge 
        // Jab tak samne wala dekh na le.
        location.reload();
    }

    // Calc
    let val = "0", op = null, prev = null, wait = false;
    function dUp() { document.getElementById('disp').innerText = val; }
    function cNum(n) {
        if(wait) { val = n; wait = false; }
        else val = val === "0" ? n : val + n;
        dUp();
    }
    function cOp(o) { prev = parseFloat(val); op = o; wait = true; }
    function cEqual() {
        if(!op) return;
        const cur = parseFloat(val);
        if(op === '+') val = (prev + cur).toString();
        if(op === '-') val = (prev - cur).toString();
        if(op === '*') val = (prev * cur).toString();
        if(op === '/') val = (prev / cur).toString();
        op = null; wait = true; dUp();
    }
    function cClear() { val = "0"; op = null; prev = null; wait = false; dUp(); }

    document.getElementById('msgIn').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
