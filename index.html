<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', 'SF Mono', monospace;
      background: #000000;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* MAIN CALCULATOR CONTAINER - phone calculator size */
    .phone-calculator {
      width: 100%;
      max-width: 360px;
      height: 600px;
      background: #0f0f10;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* LOGIN SCREEN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #121212;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .login-box {
      background: #1c1c1e;
      border-radius: 28px;
      padding: 32px 24px;
      width: 280px;
      text-align: center;
      border: 0.5px solid #2c2c2e;
    }

    .login-box h2 {
      color: #e5e5e5;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 24px;
      opacity: 0.7;
    }

    .login-box input {
      width: 100%;
      background: #0e0e0e;
      border: 0.5px solid #3a3a3c;
      border-radius: 14px;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      padding: 12px 16px;
      margin-bottom: 12px;
      outline: none;
      text-align: center;
    }

    .login-btn {
      width: 100%;
      background: #2c2c2e;
      border: none;
      border-radius: 14px;
      color: #e5e5e5;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      padding: 12px;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .login-btn:active {
      background: #3a3a3c;
      transform: scale(0.97);
    }

    #loginErr {
      color: #ff6b6b;
      font-size: 11px;
      margin-top: 12px;
    }

    /* CHAT AREA (TOP HALF - but hidden like calculator's top section) */
    .chat-area {
      flex: 1;
      background: #0a0a0c;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #222226;
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #121214;
      border-bottom: 0.5px solid #252529;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-led {
      width: 7px;
      height: 7px;
      background: #34c759;
      border-radius: 50%;
      box-shadow: 0 0 3px #34c759;
    }

    .user-name {
      color: #8e8e93;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .exit-chat {
      background: none;
      border: none;
      color: #636366;
      font-size: 11px;
      font-family: monospace;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 20px;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
    }

    .messages-container::-webkit-scrollbar {
      width: 3px;
    }

    .bubble {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
      font-family: 'Courier New', monospace;
      background: #1c1c1e;
      color: #e9e9ef;
      animation: fadeInMsg 0.2s ease;
      position: relative;
    }

    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble.sent {
      background: #2a4438;
      color: #d4f5e2;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.recv {
      background: #1f1f24;
      color: #dddfe8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.recv.seen-badge::after {
      content: "✓✓ seen";
      position: absolute;
      bottom: -14px;
      right: 0;
      font-size: 8px;
      color: #34c759;
      opacity: 0.7;
    }

    .vanishing-bubble {
      animation: vanishFade 0.45s ease forwards;
    }

    @keyframes vanishFade {
      0% { opacity: 1; transform: scale(1);}
      100% { opacity: 0; transform: scale(0.9); display: none; }
    }

    .msg-meta {
      font-size: 9px;
      opacity: 0.5;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .chat-input-area {
      display: flex;
      padding: 8px 12px 12px;
      gap: 8px;
      background: #0f0f10;
      border-top: 0.5px solid #222226;
    }

    .chat-input-area input {
      flex: 1;
      background: #19191c;
      border: 0.5px solid #2e2e32;
      border-radius: 28px;
      color: #f2f2f6;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 10px 15px;
      outline: none;
    }

    .chat-send {
      background: #2a4438;
      width: 40px;
      border-radius: 30px;
      border: none;
      color: #cef2de;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-send:active {
      background: #3e5e4e;
      transform: scale(0.94);
    }

    .other-hint {
      font-size: 9px;
      text-align: center;
      color: #3a3a3c;
      margin-bottom: 6px;
    }

    /* CALCULATOR SECTION (BOTTOM HALF) - like normal calculator */
    .calc-section {
      height: 280px;
      background: #111112;
      display: flex;
      flex-direction: column;
      border-top: 1px solid #232327;
    }

    .calc-display {
      background: #08080a;
      padding: 16px 18px;
      text-align: right;
      border-bottom: 0.5px solid #222;
    }

    .calc-expression {
      color: #6c6c70;
      font-size: 11px;
      min-height: 16px;
      font-family: monospace;
    }

    .calc-result {
      color: #f5f5f7;
      font-size: 34px;
      font-weight: 600;
      font-family: monospace;
      word-break: break-word;
    }

    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      flex: 1;
      background: #1a1a1c;
      padding: 1px;
    }

    .calc-key {
      background: #1e1e22;
      border: none;
      color: #e3e3e8;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.05s linear;
    }

    .calc-key:active {
      background: #34343a;
      transform: scale(0.96);
    }

    .calc-key.operator {
      background: #25232a;
      color: #ff9f4a;
    }

    .calc-key.equal {
      background: #2a4438;
      color: #b0f0c8;
    }

    .calc-key.clear {
      background: #322022;
      color: #ff8989;
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>█ CALCULATOR █</h2>
    <input type="text" id="loginName" placeholder="username" autocomplete="off">
    <input type="password" id="loginPass" placeholder="password" autocomplete="off">
    <button class="login-btn" onclick="attemptLogin()">UNLOCK</button>
    <div id="loginErr"></div>
  </div>
</div>

<div class="phone-calculator" id="app" style="display: none;">
  <div class="chat-area">
    <div class="chat-header">
      <div class="user-badge">
        <div class="status-led"></div>
        <div class="user-name" id="displayCurrentUser">nil</div>
      </div>
      <button class="exit-chat" onclick="performExit()">✕ EXIT</button>
    </div>
    <div class="messages-container" id="messagesContainer">
      <div class="other-hint" id="otherHint"></div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatMessageInput" placeholder="type..." maxlength="180" autocomplete="off">
      <button class="chat-send" onclick="sendMessage()">↵</button>
    </div>
  </div>

  <div class="calc-section">
    <div class="calc-display">
      <div class="calc-expression" id="calcExpression"></div>
      <div class="calc-result" id="calcResultDisplay">0</div>
    </div>
    <div class="calc-buttons" id="calcGrid"></div>
  </div>
</div>

<script>
  // ========== AUTH ==========
  const USERS = { 'nil': '143', 'hi': '143' };
  let currentUser = null;
  let otherUser = null;
  let isUserActive = true; // user is in chat (not exited)

  // ========== MESSAGE SYSTEM ==========
  const STORAGE_KEY = 'secret_calc_chat';
  let allMessages = []; // { id, sender, text, timestamp, seen }
  const SEEN_TIMEOUT = 5000; // 5 seconds after seen

  // DOM elements
  const messagesDiv = document.getElementById('messagesContainer');
  const otherHintSpan = document.getElementById('otherHint');
  const chatInput = document.getElementById('chatMessageInput');

  // Helper
  function escapeHtml(t) {
    return t.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Save to localStorage
  function persistMessages() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allMessages));
  }

  // Load from storage
  function loadMessages() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        allMessages = JSON.parse(stored);
      } catch(e) { allMessages = []; }
    }
  }

  // Mark a specific message as SEEN (when receiver views it)
  function markAsSeen(msgId) {
    const msg = allMessages.find(m => m.id === msgId);
    if (msg && !msg.seen && msg.sender !== currentUser) {
      msg.seen = true;
      msg.seenAt = Date.now();
      persistMessages();
      renderAllMessages();
      
      // Schedule deletion after SEEN_TIMEOUT
      scheduleMessageDeletion(msgId, SEEN_TIMEOUT);
    }
  }

  // Check for unseen messages and mark them as seen (when user is active in chat)
  function markAllUnseenAsSeen() {
    if (!currentUser || !isUserActive) return;
    
    for (let msg of allMessages) {
      if (msg.sender !== currentUser && !msg.seen) {
        markAsSeen(msg.id);
      }
    }
  }

  // Delete message after delay (only if it's seen OR if sender is exiting)
  function scheduleMessageDeletion(msgId, delay) {
    setTimeout(() => {
      const msgIndex = allMessages.findIndex(m => m.id === msgId);
      if (msgIndex !== -1) {
        const msg = allMessages[msgIndex];
        // Delete only if seen (or if forced by exit)
        if (msg.seen) {
          deleteMessageById(msgId);
        }
      }
    }, delay);
  }

  // Immediate delete message (used on exit)
  function deleteMessageById(msgId) {
    const index = allMessages.findIndex(m => m.id === msgId);
    if (index === -1) return;
    
    const msgElement = document.getElementById(`msg_${msgId}`);
    if (msgElement) {
      msgElement.classList.add('vanishing-bubble');
      msgElement.addEventListener('animationend', () => {
        if (msgElement.parentNode) msgElement.remove();
      });
    }
    
    allMessages.splice(index, 1);
    persistMessages();
  }

  // Delete ALL messages from current user when they exit
  function deleteAllCurrentUserMessages() {
    const toDelete = allMessages.filter(m => m.sender === currentUser);
    for (let msg of toDelete) {
      deleteMessageById(msg.id);
    }
  }

  // Add new message
  function addMessage(sender, text) {
    if (!text.trim()) return null;
    
    const newMsg = {
      id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      sender: sender,
      text: text.trim(),
      timestamp: Date.now(),
      seen: false
    };
    
    allMessages.push(newMsg);
    persistMessages();
    renderAllMessages();
    
    // If current user is receiver and active, mark seen immediately
    if (sender !== currentUser && isUserActive) {
      setTimeout(() => markAsSeen(newMsg.id), 100);
    }
    
    return newMsg;
  }

  // Render all messages
  function renderAllMessages() {
    if (!messagesDiv) return;
    
    const children = [...messagesDiv.children];
    for (let child of children) {
      if (child !== otherHintSpan) child.remove();
    }
    
    for (let msg of allMessages) {
      renderSingleMessage(msg);
    }
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function renderSingleMessage(msg) {
    const isMine = (msg.sender === currentUser);
    const msgDiv = document.createElement('div');
    msgDiv.className = `bubble ${isMine ? 'sent' : 'recv'}`;
    if (!isMine && msg.seen) msgDiv.classList.add('seen-badge');
    msgDiv.id = `msg_${msg.id}`;
    
    const senderLabel = isMine ? 'you' : msg.sender;
    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
    const seenBadge = (!isMine && msg.seen) ? '<span style="font-size:8px; margin-left:6px;">✓✓</span>' : '';
    
    msgDiv.innerHTML = `
      <div>${escapeHtml(msg.text)}</div>
      <div class="msg-meta">${senderLabel} • ${timeStr} ${seenBadge}</div>
    `;
    
    if (otherHintSpan && otherHintSpan.parentNode === messagesDiv) {
      messagesDiv.insertBefore(msgDiv, otherHintSpan);
    } else {
      messagesDiv.appendChild(msgDiv);
    }
  }

  // Send message
  function sendMessage() {
    if (!currentUser || !isUserActive) return;
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    addMessage(currentUser, text);
  }

  // Cross-tab sync
  window.addEventListener('storage', (e) => {
    if (e.key === STORAGE_KEY && currentUser) {
      const oldIds = allMessages.map(m => m.id);
      loadMessages();
      
      // Check for new messages from other user
      for (let msg of allMessages) {
        if (!oldIds.includes(msg.id) && msg.sender !== currentUser && !msg.seen && isUserActive) {
          markAsSeen(msg.id);
        }
      }
      renderAllMessages();
    }
  });

  // Periodic check for new messages
  setInterval(() => {
    if (currentUser && isUserActive) {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const parsed = JSON.parse(stored);
        if (JSON.stringify(parsed) !== JSON.stringify(allMessages)) {
          loadMessages();
          renderAllMessages();
          markAllUnseenAsSeen();
        }
      }
    }
  }, 800);

  // ========== EXIT HANDLER ==========
  function performExit() {
    if (!currentUser) return;
    
    // Mark that user is exiting
    isUserActive = false;
    
    // Delete all messages sent by current user (immediate vanish)
    deleteAllCurrentUserMessages();
    
    // Logout
    currentUser = null;
    otherUser = null;
    allMessages = [];
    persistMessages();
    
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginName').value = '';
    document.getElementById('loginPass').value = '';
    
    if (messagesDiv) {
      const kids = [...messagesDiv.children];
      for (let kid of kids) {
        if (kid !== otherHintSpan) kid.remove();
      }
    }
  }

  // ========== LOGIN ==========
  function attemptLogin() {
    const name = document.getElementById('loginName').value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value.trim();
    
    if (USERS[name] && USERS[name] === pass) {
      currentUser = name;
      otherUser = (name === 'nil') ? 'hi' : 'nil';
      isUserActive = true;
      
      document.getElementById('displayCurrentUser').innerText = currentUser;
      otherHintSpan.innerHTML = `◈ ${otherUser} is online ◈`;
      
      loadMessages();
      renderAllMessages();
      
      // Mark all unseen messages as seen immediately when user logs in
      markAllUnseenAsSeen();
      
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      chatInput.focus();
    } else {
      document.getElementById('loginErr').innerText = '❌ invalid credentials';
      setTimeout(() => document.getElementById('loginErr').innerText = '', 2000);
    }
  }

  // Enter key handlers
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  document.getElementById('loginPass').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') attemptLogin();
  });
  
  // Focus on chat area marks messages as seen
  chatInput.addEventListener('focus', () => {
    if (currentUser && isUserActive) {
      markAllUnseenAsSeen();
    }
  });
  
  // When user scrolls or interacts, mark seen
  messagesDiv.addEventListener('scroll', () => {
    if (currentUser && isUserActive) {
      markAllUnseenAsSeen();
    }
  });

  // ========== CALCULATOR ==========
  let calc = {
    display: "0",
    prev: null,
    op: null,
    waitOperand: false,
    expr: ""
  };

  function updateCalc() {
    document.getElementById('calcResultDisplay').innerText = calc.display;
    document.getElementById('calcExpression').innerText = calc.expr;
  }

  function numClick(n) {
    if (calc.waitOperand) {
      calc.display = n;
      calc.waitOperand = false;
    } else {
      calc.display = calc.display === "0" ? n : calc.display + n;
    }
    updateCalc();
  }

  function dotClick() {
    if (calc.waitOperand) {
      calc.display = "0.";
      calc.waitOperand = false;
    } else if (!calc.display.includes(".")) {
      calc.display += ".";
    }
    updateCalc();
  }

  function opClick(op) {
    const val = parseFloat(calc.display);
    if (calc.prev !== null && calc.op && !calc.waitOperand) {
      let res = compute(calc.prev, val, calc.op);
      calc.display = String(res);
      calc.prev = res;
    } else {
      calc.prev = val;
    }
    calc.op = op;
    calc.waitOperand = true;
    calc.expr = `${calc.prev} ${op === '*' ? '×' : op === '/' ? '÷' : op}`;
    updateCalc();
  }

  function compute(a, b, op) {
    switch(op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b !== 0 ? a / b : 0;
      default: return b;
    }
  }

  function equalClick() {
    if (calc.op === null || calc.waitOperand) return;
    const second = parseFloat(calc.display);
    const res = compute(calc.prev, second, calc.op);
    calc.expr = `${calc.prev} ${calc.op === '*' ? '×' : calc.op === '/' ? '÷' : calc.op} ${second} =`;
    calc.display = String(res);
    calc.prev = null;
    calc.op = null;
    calc.waitOperand = true;
    updateCalc();
  }

  function clearCalc() {
    calc = { display: "0", prev: null, op: null, waitOperand: false, expr: "" };
    updateCalc();
  }

  function signClick() {
    calc.display = String(parseFloat(calc.display) * -1);
    updateCalc();
  }

  function percentClick() {
    calc.display = String(parseFloat(calc.display) / 100);
    updateCalc();
  }

  function buildCalcButtons() {
    const grid = document.getElementById('calcGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const btns = [
      { label: 'C', act: 'clear', cls: 'clear' }, { label: '+/-', act: 'sign', cls: 'operator' }, { label: '%', act: 'percent', cls: 'operator' }, { label: '÷', act: 'div', cls: 'operator' },
      { label: '7', act: '7', cls: '' }, { label: '8', act: '8', cls: '' }, { label: '9', act: '9', cls: '' }, { label: '×', act: 'mul', cls: 'operator' },
      { label: '4', act: '4', cls: '' }, { label: '5', act: '5', cls: '' }, { label: '6', act: '6', cls: '' }, { label: '−', act: 'sub', cls: 'operator' },
      { label: '1', act: '1', cls: '' }, { label: '2', act: '2', cls: '' }, { label: '3', act: '3', cls: '' }, { label: '+', act: 'add', cls: 'operator' },
      { label: '0', act: '0', cls: '' }, { label: '.', act: 'dot', cls: '' }, { label: '=', act: 'equal', cls: 'equal' }
    ];
    
    for (let b of btns) {
      const btn = document.createElement('button');
      btn.className = `calc-key ${b.cls}`;
      btn.innerText = b.label;
      btn.onclick = () => {
        if (b.act === 'clear') clearCalc();
        else if (b.act === 'sign') signClick();
        else if (b.act === 'percent') percentClick();
        else if (b.act === 'div') opClick('/');
        else if (b.act === 'mul') opClick('*');
        else if (b.act === 'sub') opClick('-');
        else if (b.act === 'add') opClick('+');
        else if (b.act === 'equal') equalClick();
        else if (b.act === 'dot') dotClick();
        else if (!isNaN(b.act)) numClick(b.act);
      };
      grid.appendChild(btn);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    if (active && (active.id === 'chatMessageInput' || active.id === 'loginName' || active.id === 'loginPass')) return;
    const key = e.key;
    if (/^[0-9]$/.test(key)) numClick(key);
    else if (key === '.') dotClick();
    else if (key === '+') opClick('+');
    else if (key === '-') opClick('-');
    else if (key === '*') opClick('*');
    else if (key === '/') { e.preventDefault(); opClick('/'); }
    else if (key === 'Enter' || key === '=') equalClick();
    else if (key === 'Escape') clearCalc();
    else if (key === '%') percentClick();
  });

  buildCalcButtons();
  updateCalc();
</script>
</body>
</html>
