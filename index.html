<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Calc</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000000;
            --panel: #1c1c1e;
            --accent: #30d158;
            --op: #ff9f0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Login Screen */
        #loginScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; width: 300px; text-align: center; }
        .login-box input { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; 
            background: #2c2c2e; color: white; text-align: center; outline: none;
        }
        .login-btn { 
            width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: none; 
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
        }

        /* Layout */
        .container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; }

        /* Chat Part (Upper Half) */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .chat-header { padding: 12px 18px; background: #121212; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #222; }
        .chat-header span { color: var(--accent); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .exit-btn { color: #ff453a; font-size: 11px; font-weight: bold; cursor: pointer; background: none; border: none; }

        #msgContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; animation: pop 0.2s ease; }
        .sent { align-self: flex-end; background: #264a33; color: white; border-bottom-right-radius: 2px; }
        .recv { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 2px; }

        .chat-input { padding: 10px; background: #121212; display: flex; gap: 10px; border-top: 0.5px solid #222; }
        .chat-input input { flex: 1; background: #2c2c2e; border: none; padding: 10px 15px; border-radius: 20px; color: white; outline: none; }

        /* Calculator Part (Lower Half) */
        .calc-area { height: 380px; background: #000; display: flex; flex-direction: column; }
        .calc-display { padding: 20px; text-align: right; color: white; font-size: 48px; font-weight: 300; min-height: 90px; }
        .calc-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #333; }
        .btn { background: #1c1c1e; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: #3a3a3c; }
        .op { color: var(--op); }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="color: white; margin-bottom: 20px;">Calculator</h2>
        <input type="text" id="user" placeholder="Name">
        <input type="password" id="pass" placeholder="Password">
        <button class="login-btn" onclick="doLogin()">Unlock</button>
        <p id="err" style="color: #ff453a; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div class="container" id="app" style="display: none;">
    <div class="chat-area">
        <div class="chat-header">
            <span id="who">User: nil</span>
            <button class="exit-btn" onclick="doExit()">EXIT & WIPE</button>
        </div>
        <div id="msgContainer"></div>
        <div class="chat-input">
            <input type="text" id="msgIn" placeholder="Type message...">
            <button onclick="sendMsg()" style="background: none; border: none; color: var(--accent); font-weight: bold;">SEND</button>
        </div>
    </div>

    <div class="calc-area">
        <div class="calc-display" id="disp">0</div>
        <div class="calc-grid">
            <button class="btn op" onclick="cClear()">C</button>
            <button class="btn op">+/-</button>
            <button class="btn op">%</button>
            <button class="btn op" onclick="cOp('/')">÷</button>
            <button class="btn" onclick="cNum('7')">7</button>
            <button class="btn" onclick="cNum('8')">8</button>
            <button class="btn" onclick="cNum('9')">9</button>
            <button class="btn op" onclick="cOp('*')">×</button>
            <button class="btn" onclick="cNum('4')">4</button>
            <button class="btn" onclick="cNum('5')">5</button>
            <button class="btn" onclick="cNum('6')">6</button>
            <button class="btn op" onclick="cOp('-')">−</button>
            <button class="btn" onclick="cNum('1')">1</button>
            <button class="btn" onclick="cNum('2')">2</button>
            <button class="btn" onclick="cNum('3')">3</button>
            <button class="btn op" onclick="cOp('+')">+</button>
            <button class="btn" style="grid-column: span 2;" onclick="cNum('0')">0</button>
            <button class="btn" onclick="cNum('.')">.</button>
            <button class="btn op" style="background: var(--op); color: white;" onclick="cEqual()">=</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config using your Database URL
    const config = {
        apiKey: "AIzaSyAULIbWFH3f5dojXoaFYgdacp1Vl7F4nuQ",
        authDomain: "calc-34b58.firebaseapp.com",
        databaseURL: "https://calc-34b58-default-rtdb.firebaseio.com",
        projectId: "calc-34b58",
        storageBucket: "calc-34b58.firebasestorage.app",
        messagingSenderId: "882053838693",
        appId: "1:882053838693:web:5098cdac4f65b583f9d38c"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    let me = "";

    // Auth
    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if((u === "nil" && p === "143") || (u === "hi" && p === "143")) {
            me = u;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('who').innerText = `User: ${u}`;
            loadChat();
        } else {
            document.getElementById('err').innerText = "Access Denied";
        }
    }

    // Chat
    function loadChat() {
        db.ref('messages').on('value', (snap) => {
            const cont = document.getElementById('msgContainer');
            cont.innerHTML = "";
            const msgs = snap.val();
            if(msgs) {
                Object.keys(msgs).forEach(id => {
                    const m = msgs[id];
                    const d = document.createElement('div');
                    d.className = `bubble ${m.s === me ? 'sent' : 'recv'}`;
                    d.innerText = m.t;
                    cont.appendChild(d);

                    // Auto-delete seen messages after 5s
                    if(m.s !== me && !m.v) {
                        db.ref('messages/' + id).update({ v: true });
                        setTimeout(() => db.ref('messages/' + id).remove(), 5000);
                    }
                });
                cont.scrollTop = cont.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgIn');
        if(!inp.value.trim()) return;
        db.ref('messages').push({ s: me, t: inp.value, v: false });
        inp.value = "";
    }

    function doExit() {
        // Wipe my messages and reload
        db.ref('messages').once('value', (snap) => {
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    if(data[id].s === me) db.ref('messages/' + id).remove();
                });
            }
            location.reload();
        });
    }

    // Calc Logic
    let val = "0", op = null, prev = null, wait = false;
    function dUp() { document.getElementById('disp').innerText = val; }
    function cNum(n) {
        if(wait) { val = n; wait = false; }
        else val = val === "0" ? n : val + n;
        dUp();
    }
    function cOp(o) { prev = parseFloat(val); op = o; wait = true; }
    function cEqual() {
        if(!op) return;
        const cur = parseFloat(val);
        if(op === '+') val = (prev + cur).toString();
        if(op === '-') val = (prev - cur).toString();
        if(op === '*') val = (prev * cur).toString();
        if(op === '/') val = (prev / cur).toString();
        op = null; wait = true; dUp();
    }
    function cClear() { val = "0"; op = null; prev = null; wait = false; dUp(); }

    document.getElementById('msgIn').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
